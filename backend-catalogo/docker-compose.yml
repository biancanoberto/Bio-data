services:
  db:
    image: postgres:16-alpine
    container_name: catalogo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_catalogo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_catalogo"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogo_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backend_catalogo
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project-id.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-your-supabase-service-role-key}
    ports:
      - "3000:3000"
    volumes:
      - ./prisma/seed-assets/animals:/app/prisma/seed-assets/animals:ro

volumes:
  db_data:
